<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#0b1220" />
      <stop offset="62%" stop-color="#fde68a" stop-opacity="0.95" />
      <stop offset="78%" stop-color="#f59e0b" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Maskable icons: design must sit within the inner 80% (the "safe zone")
       so launchers can mask the icon into circles/squircles without cropping
       the corona. Outer ring scaled down vs. pwa-icon.svg; background extends
       to all four edges so OS masking doesn't reveal transparency. -->
  <rect width="512" height="512" fill="#0b1220" />
  <circle cx="256" cy="256" r="170" fill="url(#corona)" />
  <circle cx="256" cy="256" r="85" fill="#0b1220" />
</svg>
